name: Deploy Frontend — Azure Static Web App

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject backend URL into config.js files
        run: |
          BACKEND_URL="https://ca-optimabot-be-poc.bravedesert-6026246e.westeurope.azurecontainerapps.io"
          sed -i "s|__BACKEND_URL__|${BACKEND_URL}|g" customer/config.js
          sed -i "s|__BACKEND_URL__|${BACKEND_URL}|g" waiter/config.js
          sed -i "s|__BACKEND_URL__|${BACKEND_URL}|g" kds/config.js
          echo "Backend URL injected: ${BACKEND_URL}"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/"
          skip_app_build: true
          output_location: ""

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request

    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
